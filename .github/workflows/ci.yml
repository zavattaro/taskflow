name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore backend/TaskFlow.sln

      - name: Build
        run: dotnet build backend/TaskFlow.sln --no-restore -c Release

      - name: Test
        run: dotnet test backend/TaskFlow.sln --no-build -c Release --verbosity normal

  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/taskflow-web/package-lock.json

      - name: Install
        working-directory: frontend/taskflow-web
        run: npm ci

      - name: Build
        working-directory: frontend/taskflow-web
        run: npm run build
